<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Hex Industries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #05070d;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
}
.nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 18px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 999;
}

.logo {
  font-size: 13px;
  letter-spacing: 2px;
  font-weight: 600;
  color: white;
}

.nav-links {
  display: flex;
  gap: 25px;
}

.nav-links a {
  font-size: 12px;
  text-decoration: none;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1px;
  transition: 0.3s;
}

.nav-links a:hover {
  color: white;
}

.search-box input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 7px 12px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
  outline: none;
}

.search-box input::placeholder {
  color: rgba(255,255,255,0.4);
}
.container {
  max-width: 600px;
}

h1 {
  font-size: 32px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

p {
  color: rgba(255,255,255,0.7);
  line-height: 1.6;
  font-size: 14px;
}

.status {
  margin-top: 20px;
  display: inline-block;
  padding: 10px 18px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(0,170,255,0.8);
}
</style>

</head>

<body>
  <div class="container">
    <h1>CONTACT</h1>

    <p>
      Hex Industries is currently operating in early development phase.  
      Communication channels and partnership access protocols are being structured.
    </p>

    <div class="status">
      Contact Channels Coming Soon
    </div>
  </div>
</body>
</html>
