<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Industries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #05070B;
  color: #E6E9F2;
  overflow-x: hidden;
}

/* NAVIGATION */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 22px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(5,7,11,0.55);
  backdrop-filter: blur(12px);
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

nav .logo {
  font-weight: 700;
  letter-spacing: 2px;
  font-size: 14px;
}

nav .links a {
  color: #AAB2C0;
  margin: 0 14px;
  text-decoration: none;
  font-size: 13px;
  transition: 0.3s;
}

nav .links a:hover {
  color: #7AA2FF;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 20px;
}

/* VIDEO BACKGROUND */
.hero video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  filter: brightness(0.35) contrast(1.1);
}

/* DARK OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(5,7,11,0.3),
    rgba(5,7,11,0.85)
  );
  z-index: -1;
}

/* HERO CONTENT */
.hero-content {
  max-width: 900px;
}

.hero h1 {
  font-size: 52px;
  font-weight: 600;
  letter-spacing: 2px;
  line-height: 1.2;
}

.hero p {
  margin-top: 18px;
  color: #AAB2C0;
  font-size: 15px;
  letter-spacing: 1px;
}

.tagline {
  margin-top: 8px;
  color: #7AA2FF;
  font-weight: 500;
  letter-spacing: 1px;
}

/* BUTTON */
.hero button {
  margin-top: 32px;
  padding: 12px 26px;
  background: transparent;
  border: 1px solid #7AA2FF;
  color: #7AA2FF;
  font-size: 13px;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  background: #7AA2FF;
  color: #05070B;
}

/* RESPONSIVE */
@media(max-width: 768px) {
  nav {
    padding: 18px 20px;
  }

  .hero h1 {
    font-size: 34px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">HEX INDUSTRIES</div>

  <div class="links">
    <a href="#">Mission</a>
    <a href="#">Capabilities</a>
    <a href="#">Systems</a>
    <a href="#">Research</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">

  <video autoplay muted loop playsinline>
    <source src="assets/hero.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>ENGINEERING NEXT-GENERATION SYSTEMS</h1>
    <p>Advanced aerospace and autonomous technologies for future operational environments.</p>
    <div class="tagline">Innovating Tomorrow, Today.</div>

    <button>Explore Capabilities</button>
  </div>

</section>

</body>
</html>
