<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: #e5e5e5;
  overflow-x: hidden;
}

header {
  padding: 20px 50px;
  font-size: 18px;
  letter-spacing: 2px;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

/* HERO */
.hero {
  padding: 140px 50px;
  font-size: 52px;
  font-weight: 700;
  max-width: 900px;
  line-height: 1.2;

  opacity: 0;
  transform: translateY(60px);
  animation: heroReveal 1.8s ease forwards;
  animation-delay: 0.5s;
}

/* SECTIONS */
.section {
  padding: 100px 50px;
  opacity: 0;
  transform: translateY(80px) scale(0.98);
  transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}

.section.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.title {
  font-size: 28px;
  margin-bottom: 25px;
}

footer {
  padding: 50px;
  color: #666;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

footer.show {
  opacity: 1;
  transform: translateY(0);
}

/* KEYFRAMES */
@keyframes heroReveal {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
</style>
